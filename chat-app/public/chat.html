<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAT DOS FOFO 💕</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💕</text></svg>">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="chat-app">
        <aside id="side-panel">
            <header><span>CHAT DOS FOFO 💕</span></header>
            <div id="user-list">
                </div>
        </aside>

        <main id="main-content">
            <div id="settings-panel">
                <div class="settings-header">
                    <i class="fa-solid fa-user-gear"></i> Meu Perfil e Tema
                </div>
                
                <div class="settings-body">
                    <div class="profile-edit-row">
                        <img id="current-user-avatar" src="" alt="Avatar" class="user-avatar" onclick="document.getElementById('profile-file-input').click()">
                        <input type="file" id="profile-file-input" style="display:none;" accept="image/*" onchange="updateProfilePhoto(this)">
                        
                        <div class="name-edit-group">
                            <input type="text" id="edit-username" placeholder="Seu nome...">
                            <button onclick="updateProfileName()" class="btn-icon">
                                <i class="fa-solid fa-floppy-disk"></i>
                            </button>
                        </div>
                    </div>

                    <div class="theme-picker-group">
                        <label>Cor de Destaque:</label>
                        <div class="color-options">
                            <div class="color-dot active" style="background: #690090;" onclick="changeThemeColor('#690090', this)"></div>
                            <div class="color-dot" style="background: #3498db;" onclick="changeThemeColor('#3498db', this)"></div>
                            <div class="color-dot" style="background: #2ecc71;" onclick="changeThemeColor('#2ecc71', this)"></div>
                            <div class="color-dot" style="background: #f1c40f;" onclick="changeThemeColor('#f1c40f', this)"></div>
                            <div class="color-dot" style="background: #e74c3c;" onclick="changeThemeColor('#e74c3c', this)"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="chat-container">
                <div id="chat"></div>
            </div>
            
            <div id="typing-indicator"></div>

            <div id="inputArea">
                <button onclick="document.getElementById('file-input').click()" class="btn-icon">
                    <i class="fa-solid fa-image"></i>
                </button>
                <input type="file" id="file-input" style="display:none;" accept="image/*" onchange="sendImage(this)">
                
                <input type="text" id="message" placeholder="Escreva algo incrível..." onkeypress="handleKeyPress(event)">
                
                <button class="btn-send-main" onclick="sendMessage()">
                    <span>Enviar</span> <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
