<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Chat dos Fofo 💕</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <header>
        <span>CHAT DOS FOFO 💕</span>
        <button onclick="document.body.classList.toggle('light-theme')">🌓 Tema</button>
    </header>
    
    <div id="side-panel">
        <div id="news-board"><strong>Avisos 📢</strong><p>Modo 🔥 ativo! Mensagens autodestrutivas.</p></div>
        <div class="panel-section">
            <button onclick="toggleEdit()">⚙️ Meu Perfil</button>
            <div id="edit-fields" style="display:none; margin-top:10px;">
                <input id="new-name" placeholder="Nome...">
                <input id="new-photo" placeholder="Link foto...">
                <input type="color" id="new-color" value="#00f2ff">
                <button onclick="updateProfile()">Salvar</button>
            </div>
        </div>
        <div class="panel-section">
            <h4>Online (<span id="user-count">0</span>)</h4>
            <ul id="user-list"></ul>
        </div>
    </div>

    <div id="chat-container">
        <div id="chat"></div>
    </div>

    <div id="typing-indicator"></div>

    <div id="reply-container" style="display:none;">
        <span id="reply-text"></span>
        <button onclick="cancelReply()">✕</button>
    </div>

    <div id="inputArea">
        <div class="input-wrapper">
            <button id="burn-btn" onclick="toggleBurn()">🔥</button>
            <button onclick="document.getElementById('file-input').click()">📷</button>
            <input type="file" id="file-input" style="display:none;" accept="image/*" onchange="sendImage(this)">
            <input id="message" placeholder="Escreve algo..." oninput="handleTyping()" onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="btn-send-main" onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
