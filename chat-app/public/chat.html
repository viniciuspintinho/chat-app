<body class="dark-theme">
    <div id="chat-app">
        <aside id="side-panel">
            <header><span>CHAT DOS FOFO 💕</span></header>
            <div id="user-list"></div>
        </aside>
        <main id="main-content">
            <div id="chat-container"><div id="chat"></div></div>
            <div id="typing-indicator"></div>
            <div id="inputArea">
                <input id="message" placeholder="Digite..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="btn-send-main" onclick="sendMessage()">Enviar</button>
            </div>
        </main>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
