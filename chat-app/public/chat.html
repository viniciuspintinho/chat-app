<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Moderno</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="chat-app">
        <aside id="side-panel">
            <header><span>CHAT DOS FOFO 💕</span></header>
            <div id="user-list">
                </div>
        </aside>

        <main id="main-content">
            <div id="chat-container">
                <div id="chat"></div>
            </div>
            
            <div id="typing-indicator"></div>

            <div id="inputArea">
                <button onclick="document.getElementById('file-input').click()" class="btn-icon">
                    <i class="fa-solid fa-image"></i>
                </button>
                <input type="file" id="file-input" style="display:none;" accept="image/*" onchange="sendImage(this)">
                
                <input type="text" id="message" placeholder="Escreva algo incrível..." onkeypress="handleKeyPress(event)">
                
                <button class="btn-send-main" onclick="sendMessage()">
                    <span>Enviar</span> <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
