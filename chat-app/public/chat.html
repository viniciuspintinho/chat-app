<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Chat dos Fofo 💕</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>CHAT DOS FOFO 💕</header>
    
    <div class="main-container">
        <aside id="sidebar">
            <h3>Online (<span id="user-count">0</span>)</h3>
            <ul id="user-list"></ul>
        </aside>

        <main class="chat-area">
            <div id="chat"></div>
            <div id="inputArea">
                <input id="message" placeholder="Digite sua mensagem..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">Enviar</button>
            </div>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
