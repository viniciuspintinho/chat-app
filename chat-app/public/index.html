<div class="login">
    <h2>Entrar no Chat</h2>
    <input id="username" placeholder="Seu nome" />
    <input id="userphoto" placeholder="Link da sua foto (URL)" />
    <button onclick="login()">Entrar</button>
</div>

<script>
function login() {
    const name = document.getElementById("username").value;
    const photo = document.getElementById("userphoto").value || "https://ui-avatars.com/api/?name=" + name;

    if (!name) {
        alert("Digite um nome");
        return;
    }

    localStorage.setItem("username", name);
    localStorage.setItem("userphoto", photo); // Salva a foto
    window.location.href = "chat.html";
}
</script>
