<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Chat</title>
    <style>
        body { font-family: sans-serif; background: #111; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login { background: #222; padding: 30px; border-radius: 10px; text-align: center; }
        input { padding: 10px; margin: 10px 0; width: 250px; background: #333; border: 1px solid #444; color: #fff; border-radius: 5px; }
        button { padding: 10px 20px; background: #00ffcc; border: none; border-radius: 5px; cursor: pointer; color: #000; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login">
        <h2>Entrar no Chat</h2>
        <input id="username" placeholder="Seu nome..." />
        <input id="userphoto" placeholder="Link da foto (URL) - opcional" />
        <button onclick="login()">Entrar</button>
    </div>

    <script>
        function login() {
            const name = document.getElementById("username").value;
            const photoInput = document.getElementById("userphoto").value;
            
            if (!name) return alert("Por favor, digite um nome!");

            // Se não tiver foto, usa um gerador de iniciais gratuito
            const photo = photoInput || `https://ui-avatars.com/api/?name=${name}&background=00ffcc&color=121212`;

            localStorage.setItem("username", name);
            localStorage.setItem("userphoto", photo);
            window.location.href = "chat.html";
        }
    </script>
</body>
</html>
